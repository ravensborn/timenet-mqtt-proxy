services:
  mqtt-proxy:
    build: .
    container_name: mqtt-proxy
    restart: unless-stopped
    ports:
      - "9883:1883"
    environment:
      # Host to listen on (default: 0.0.0.0)
      - LISTEN_HOST=0.0.0.0
      # Port to accept plain MQTT connections
      - LISTEN_PORT=1883
      # Target MQTT broker hostname (CHANGE THIS)
      - TARGET_HOST=iot.teknykar.com
      # Target port (TLS)
      - TARGET_PORT=8883
      # Verify SSL certificate (set to 'false' for self-signed certs)
      - VERIFY_SSL=true
      # CA certificate is baked into the image by the Dockerfile (COPY certs /certs).
      - CA_CERT_PATH=/certs/ca.pem
      # Username and password to be injected
      - DEFAULT_USERNAME=${DEFAULT_USERNAME}
      - DEFAULT_PASSWORD=${DEFAULT_PASSWORD}
      # --- Clear the data-flash backlog ONCE per device, then RESTART the proxy ---
      # List the IMEIs to clear (comma-separated). That's all that's needed - the default
      # command is "clear data flash". Empty/unset = nothing is sent.
      # - ONESHOT_IMEIS=180325000001092,180325000001093
      # Optional: override the command (QUOTE it so the '#' survives), e.g. reboot:
      # - "ONESHOT_COMMAND=@CMD,*000000,991#,#"

    # NOTE: no ./certs volume mount on purpose.
    # The cert is committed to the repo and baked into the image via "COPY certs /certs".
    # A relative bind mount (./certs:/certs:ro) does NOT resolve to the cloned repo dir under
    # Dokploy, so it overlays an empty directory on top of /certs and hides ca.pem at runtime.
    # If you ever need to override the cert without rebuilding, mount an ABSOLUTE host path:
    #   volumes:
    #     - /opt/timenet/certs:/certs:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 1883)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
